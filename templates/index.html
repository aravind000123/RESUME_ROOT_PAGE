<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aravind's ROOT Projects</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            height: 100vh;

            background: linear-gradient(125deg, #ffffff, #e0f7fa, #fce4ec, #f1f8e9);
            background-size: 400% 400%;
            animation: smokeMove 12s ease infinite;

            display: flex;
            flex-direction: column;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        @keyframes smokeMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;

            height: 60px;
            width: 100%;
            padding: 5px;
        }

        .comment,
        .read_comment,
        .project {
            height: 90%;
            padding: 0 10px;

            font-size: 22px;
            background-color: rgb(62, 60, 60);
            color: white;

            border-radius: 5px;
            border: none;

            transition: transform 0.2s ease;
            cursor: pointer;
        }

        .comment:hover,
        .read_comment:hover,
        .project:hover {
            background-color: yellow;
            color: black;
            transform: translateY(-3px);
        }

        .iframe {
            flex: 1;
            width: 100%;
            border: none;
        }
       .comment,.project,.read_comment{
        width:33%;
       } 
       .active {
            background-color: rgb(82, 245, 115);
            color: black;
            transform: translateY(-3px);
        }

        @media (max-width: 500px) {
            .comment,
            .read_comment,
            .project {
                font-size: 12px;
                padding: 5px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="nav-bar">
            <button class="comment" onclick="go_to_page(this,'post_comment')">🗨️ Write Comment</button>
            <button class="project" onclick="go_to_page(this,'projects')">PROJECTS</button>
            <button class="read_comment" onclick="go_to_page(this,'read_comments')">💬 Read Comment</button>
        </div>

        <iframe class="iframe"></iframe>
    </div>

    <script>
        function go_to_page(position,page) {
            document.querySelector(".iframe").src = '/' + page;

            document.querySelectorAll(".nav-bar button").forEach(ele => {
                ele.classList.remove("active")                            
            });
            position.classList.add("active")
        }
        window.onload = function () {
            document.querySelector(".project").click();
        };
    </script>

</body>
</html>
